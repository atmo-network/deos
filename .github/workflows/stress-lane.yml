name: Stress Lane

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  scheduler-stress-lane:
    name: AAA Scheduler Stress Lane
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      SKIP_WASM_BUILD: 1
    defaults:
      run:
        working-directory: template
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain from template/rust-toolchain.toml
        run: |
          python3 - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          toolchain = tomllib.loads(Path('rust-toolchain.toml').read_text())['toolchain']
          command = [
            'rustup',
            'toolchain',
            'install',
            toolchain['channel'],
            '--profile',
            toolchain.get('profile', 'minimal'),
          ]
          for component in toolchain.get('components', []):
            command.extend(['--component', component])
          for target in toolchain.get('targets', []):
            command.extend(['--target', target])
          subprocess.check_call(command)
          PY
          rustup show active-toolchain

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            template/target
          key: ${{ runner.os }}-cargo-stress-${{ hashFiles('template/Cargo.lock', 'template/rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stress-

      - name: Stress matrix - over-capacity fairness (10k)
        run: /usr/bin/time -f "stress.over_capacity.seconds=%e" timeout 35m cargo test -p tmctol-runtime --release --locked scheduler_stress_lane_over_capacity_fairness_matrix -- --ignored --nocapture

      - name: Stress diagnostics - queue/wakeup occupancy (10k)
        run: /usr/bin/time -f "stress.queue_wakeup_profile.seconds=%e" timeout 35m cargo test -p tmctol-runtime --release --locked profile_scheduler_queue_wakeup_occupancy_10k -- --ignored --nocapture

      - name: Stress matrix - dense vs sparse topology
        run: /usr/bin/time -f "stress.dense_sparse.seconds=%e" timeout 35m cargo test -p tmctol-runtime --release --locked scheduler_stress_lane_dense_vs_sparse_topology_matrix -- --ignored --nocapture

      - name: Stress matrix - sparse long-run liveness
        run: /usr/bin/time -f "stress.sparse_long.seconds=%e" timeout 35m cargo test -p tmctol-runtime --release --locked scheduler_stress_lane_sparse_topology_long_run_liveness -- --ignored --nocapture

      - name: Stress matrix - ringless 10k actors
        run: /usr/bin/time -f "stress.ringless_10k.seconds=%e" timeout 20m cargo test -p tmctol-runtime --release --locked stress_10k_actors_ringless_scheduler -- --ignored --nocapture
